<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Portfolio with Interactive Feature</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Floating Button */
        .floating-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(0, 255, 200, 0.8), rgba(0, 150, 255, 0.8));
            border: 2px solid rgba(0, 255, 200, 0.5);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.4), inset 0 0 10px rgba(0, 255, 200, 0.2);
            transition: all 0.3s ease;
            z-index: 1000;
            animation: pulse 2s infinite;
        }

        .floating-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.6), inset 0 0 15px rgba(0, 255, 200, 0.3);
        }

        .floating-btn:active {
            transform: scale(0.95);
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 255, 200, 0.4), inset 0 0 10px rgba(0, 255, 200, 0.2);
            }
            50% {
                box-shadow: 0 0 30px rgba(0, 255, 200, 0.6), inset 0 0 15px rgba(0, 255, 200, 0.3);
            }
        }

        /* Modal Panel */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            opacity: 0;
            visibility: hidden;
            width: 90%;
            max-width: 450px;
            background: rgba(10, 10, 20, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 200, 0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 255, 200, 0.2), inset 0 0 20px rgba(0, 255, 200, 0.05);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 2000;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 200, 0.2);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 200, 0.5);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #00ffcc;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(0, 255, 200, 0.1);
            transform: scale(1.1);
        }

        .info-list {
            list-style: none;
            padding: 0;
        }

        .info-item {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0, 255, 200, 0.05);
            border-radius: 10px;
            border-left: 3px solid rgba(0, 255, 200, 0.4);
        }

        .info-label {
            font-weight: bold;
            color: #00ffcc;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .info-value {
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        /* Spider Animation */
        .spider {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 20px;
            height: 20px;
            z-index: 10;
        }

        .spider::before {
            content: '🕷️';
            position: absolute;
            font-size: 1.5rem;
            filter: drop-shadow(0 0 5px rgba(0, 255, 200, 0.6));
            animation: spiderSwing 4s ease-in-out infinite;
        }

        .spider::after {
            content: '';
            position: absolute;
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(0, 255, 200, 0.6), transparent);
            top: 15px;
            left: 9px;
        }

        @keyframes spiderSwing {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(5px) rotate(2deg); }
            50% { transform: translateX(0) rotate(0deg); }
            75% { transform: translateX(-5px) rotate(-2deg); }
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1500;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .floating-btn {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                font-size: 20px;
            }

            .modal {
                width: 95%;
                padding: 20px;
            }

            .modal-title {
                font-size: 1.2rem;
            }
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 255, 200, 0.3);
            border-radius: 50%;
            border-top-color: #00ffcc;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Your existing portfolio content goes here -->
    <div style="padding: 50px; text-align: center;">
        <h1>Welcome to My Portfolio</h1>
        <p>This is a sample portfolio page. Click the floating button to see the interactive feature!</p>
    </div>

    <!-- Floating Button -->
    <button class="floating-btn" id="floatingBtn" aria-label="Open Info Panel">⚡</button>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Modal Panel -->
    <div class="modal" id="infoModal">
        <div class="spider" id="spider"></div>
        <div class="modal-header">
            <h2 class="modal-title">System Information</h2>
            <button class="close-btn" id="closeBtn" aria-label="Close">&times;</button>
        </div>
        <ul class="info-list" id="infoList">
            <li class="info-item">
                <div class="info-label">Device/OS:</div>
                <div class="info-value" id="deviceInfo"><span class="loading"></span> Detecting...</div>
            </li>
            <li class="info-item">
                <div class="info-label">Browser:</div>
                <div class="info-value" id="browserInfo"><span class="loading"></span> Detecting...</div>
            </li>
            <li class="info-item">
                <div class="info-label">IP Address:</div>
                <div class="info-value" id="ipInfo"><span class="loading"></span> Fetching...</div>
            </li>
            <li class="info-item">
                <div class="info-label">Location:</div>
                <div class="info-value" id="locationInfo"><span class="loading"></span> Fetching...</div>
            </li>
            <li class="info-item">
                <div class="info-label">Date & Time:</div>
                <div class="info-value" id="datetimeInfo"><span class="loading"></span> Loading...</div>
            </li>
        </ul>
    </div>

    <script>
        // DOM Elements
        const floatingBtn = document.getElementById('floatingBtn');
        const overlay = document.getElementById('overlay');
        const infoModal = document.getElementById('infoModal');
        const closeBtn = document.getElementById('closeBtn');
        const deviceInfo = document.getElementById('deviceInfo');
        const browserInfo = document.getElementById('browserInfo');
        const ipInfo = document.getElementById('ipInfo');
        const locationInfo = document.getElementById('locationInfo');
        const datetimeInfo = document.getElementById('datetimeInfo');

        // Sound effect (optional)
        function playClickSound() {
            // Create a simple beep sound using Web Audio API
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.1);

                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {
                // Fallback: no sound if Web Audio API not supported
            }
        }

        // Detect Browser
        function detectBrowser() {
            const ua = navigator.userAgent;
            if (ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome';
            if (ua.includes('Firefox')) return 'Firefox';
            if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
            if (ua.includes('Edg')) return 'Edge';
            if (ua.includes('OPR') || ua.includes('Opera')) return 'Opera';
            return 'Unknown';
        }

        // Detect OS
        function detectOS() {
            const ua = navigator.userAgent;
            if (ua.includes('Windows')) return 'Windows';
            if (ua.includes('Mac')) return 'macOS';
            if (ua.includes('Linux')) return 'Linux';
            if (ua.includes('Android')) return 'Android';
            if (ua.includes('iOS') || ua.includes('iPhone') || ua.includes('iPad')) return 'iOS';
            return 'Unknown';
        }

        // Fetch IP and Location
        async function fetchIPInfo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    ip: data.ip,
                    location: `${data.city}, ${data.country_name}`
                };
            } catch (error) {
                console.error('Error fetching IP info:', error);
                return {
                    ip: 'Unable to fetch',
                    location: 'Unable to fetch'
                };
            }
        }

        // Update Info
        async function updateInfo() {
            // Device/OS
            deviceInfo.innerHTML = detectOS();

            // Browser
            browserInfo.innerHTML = detectBrowser();

            // Date & Time
            const now = new Date();
            datetimeInfo.innerHTML = now.toLocaleString();

            // IP and Location
            const ipData = await fetchIPInfo();
            ipInfo.innerHTML = ipData.ip;
            locationInfo.innerHTML = ipData.location;
        }

        // Modal Controls
        function openModal() {
            overlay.classList.add('active');
            infoModal.classList.add('active');
            updateInfo();
            playClickSound();
        }

        function closeModal() {
            overlay.classList.remove('active');
            infoModal.classList.remove('active');
        }

        // Event Listeners
        floatingBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', closeModal);

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && infoModal.classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
